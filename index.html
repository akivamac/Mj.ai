<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Monkey Joe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">🐒 Monkey Joe</span>
      <button id="new-chat-btn" title="New Chat">+</button>
    </div>
    <div id="chat-list"></div>
    <div id="sidebar-footer">
      <button id="settings-btn" onclick="location.href='settings.html'">⚙ Settings</button>
      <button id="logout-btn" onclick="sessionStorage.removeItem('mj_auth');location.reload();">⇠ Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="topbar">
      <button id="sidebar-toggle">☰</button>
      <span id="chat-title">New Chat</span>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <button id="attach-photo-btn" title="Examine a photo">📷</button>
      <button id="draw-btn" title="Open drawing pad">✏️</button>
      <textarea id="user-input" placeholder="Talk to Monkey Joe..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </main>

  <!-- Search permission modal -->
  <div id="search-modal" class="modal hidden">
    <div class="modal-box">
      <p>Joe wants to search the web for:</p>
      <strong id="search-query-preview"></strong>
      <div class="modal-actions">
        <button id="search-allow">Allow</button>
        <button id="search-deny">Deny</button>
      </div>
    </div>
  </div>

  <!-- Draw modal -->
  <div id="draw-modal" class="modal hidden">
    <div class="modal-box">
      <p>Draw something simple for Joe:</p>
      <canvas id="draw-canvas" width="300" height="300"></canvas>
      <div class="modal-actions">
        <button id="draw-clear">Clear</button>
        <button id="draw-submit">Send to Joe</button>
        <button id="draw-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- File viewer modal -->
  <div id="viewer-modal" class="modal hidden">
    <div class="modal-box viewer-box">
      <div class="viewer-header">
        <span id="viewer-title">File</span>
        <div style="display:flex;gap:8px;">
          <button id="viewer-download-btn" class="file-btn file-btn-dl">⬇ Download</button>
          <button onclick="document.getElementById('viewer-modal').classList.add('hidden')" class="file-btn">✕ Close</button>
        </div>
      </div>
      <div id="viewer-body" class="viewer-body"></div>
    </div>
  </div>

  <!-- Photo modal -->
  <div id="photo-modal" class="modal hidden">
    <div class="modal-box">
      <p>Draw or describe what you see in the photo:</p>
      <canvas id="photo-canvas" width="300" height="300"></canvas>
      <textarea id="photo-desc" placeholder="Or type a description..." rows="3"></textarea>
      <div class="modal-actions">
        <button id="photo-clear">Clear</button>
        <button id="photo-submit">Send to Joe</button>
        <button id="photo-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/files.js"></script>
  <script src="js/brain.js"></script>
  <script src="js/search.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/photo.js"></script>
  <script src="js/mcp.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>

  <!-- Password gate -->
  <div id="password-gate" style="
    position:fixed;inset:0;background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;flex-direction:column;gap:16px;">
    <div style="font-size:2rem;">🐒</div>
    <div style="font-size:1.1rem;font-weight:bold;">Monkey Joe</div>
    <input id="password-input" type="password"
      placeholder="Password"
      style="padding:10px 16px;border-radius:8px;border:1px solid var(--border);
             background:var(--input-bg);color:var(--text);font-size:1rem;
             width:220px;text-align:center;"
      autofocus />
    <button id="password-submit"
      style="background:var(--accent);color:white;border:none;
             padding:10px 24px;border-radius:8px;font-size:1rem;cursor:pointer;">
      Enter
    </button>
    <div id="password-error" style="color:#c0392b;font-size:0.85rem;display:none;">
      Wrong password
    </div>
  </div>
  <script>
    (function() {
      const gate = document.getElementById('password-gate');
      if (sessionStorage.getItem('mj_auth') === '1') { gate.remove(); return; }
      const input = document.getElementById('password-input');
      const btn   = document.getElementById('password-submit');
      const err   = document.getElementById('password-error');
      function tryPass() {
        if (typeof CONFIG !== 'undefined' && input.value === CONFIG.password) {
          sessionStorage.setItem('mj_auth', '1');
          gate.remove();
        } else {
          err.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }
      btn.addEventListener('click', tryPass);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') tryPass(); });
    })();
  </script>
</body>
</html>
