<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Monkey Joe</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">🐒 Monkey Joe</span>
      <button id="new-chat-btn" title="New Chat">+</button>
    </div>
    <div id="chat-list"></div>
    <div id="sidebar-footer">
      <button id="settings-btn" onclick="location.href='settings.html'">⚙ Settings</button>
      <button id="logout-btn" onclick="sessionStorage.removeItem('mj_auth');location.reload();">⇠ Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="topbar">
      <button id="sidebar-toggle">☰</button>
      <span id="chat-title">New Chat</span>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <button id="attach-photo-btn" title="Examine a photo">📷</button>
      <button id="draw-btn" title="Open drawing pad">✏️</button>
      <textarea id="user-input" placeholder="Talk to Monkey Joe..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </main>

  <!-- Search permission modal -->
  <div id="search-modal" class="modal hidden">
    <div class="modal-box">
      <p>Joe wants to search the web for:</p>
      <strong id="search-query-preview"></strong>
      <div class="modal-actions">
        <button id="search-allow">Allow</button>
        <button id="search-deny">Deny</button>
      </div>
    </div>
  </div>

  <!-- Draw modal -->
  <div id="draw-modal" class="modal hidden">
    <div class="modal-box">
      <p>Draw something simple for Joe:</p>
      <canvas id="draw-canvas" width="300" height="300"></canvas>
      <div class="modal-actions">
        <button id="draw-clear">Clear</button>
        <button id="draw-submit">Send to Joe</button>
        <button id="draw-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- File viewer modal -->
  <div id="viewer-modal" class="modal hidden">
    <div class="modal-box viewer-box">
      <div class="viewer-header">
        <span id="viewer-title">File</span>
        <div style="display:flex;gap:8px;">
          <button id="viewer-download-btn" class="file-btn file-btn-dl">⬇ Download</button>
          <button onclick="document.getElementById('viewer-modal').classList.add('hidden')" class="file-btn">✕ Close</button>
        </div>
      </div>
      <div id="viewer-body" class="viewer-body"></div>
    </div>
  </div>

  <!-- Photo modal -->
  <div id="photo-modal" class="modal hidden">
    <div class="modal-box">
      <p>Draw or describe what you see in the photo:</p>
      <canvas id="photo-canvas" width="300" height="300"></canvas>
      <textarea id="photo-desc" placeholder="Or type a description..." rows="3"></textarea>
      <div class="modal-actions">
        <button id="photo-clear">Clear</button>
        <button id="photo-submit">Send to Joe</button>
        <button id="photo-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/backside.js"></script>
  <script src="js/files.js"></script>
  <script src="js/brain.js"></script>
  <script src="js/search.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/photo.js"></script>
  <script src="js/mcp.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>

  <!-- Password gate -->
  <style>
    #password-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: #faf7f2;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
      font-family: 'DM Sans', sans-serif;
    }
    #password-gate .mj-glow {
      position: absolute; top: -120px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px; pointer-events: none;
      background: radial-gradient(ellipse, rgba(200,134,26,0.07) 0%, transparent 65%);
    }
    #password-gate .mj-card {
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      width: 100%; max-width: 380px;
      position: relative; z-index: 1;
    }
    #password-gate .mj-logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    #password-gate .mj-logo-text {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 24px;
      color: #1e1a14; letter-spacing: -0.02em; line-height: 1;
    }
    #password-gate .mj-logo-text span { color: #c8861a; }
    #password-gate h2 {
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: clamp(20px,4vw,26px);
      color: #1e1a14; letter-spacing: -0.025em; margin-bottom: 6px;
    }
    #password-gate .mj-sub {
      font-size: 14px; color: #6b5f4a; margin-bottom: 22px; line-height: 1.55;
    }
    #password-gate label {
      display: block; font-size: 13px; font-weight: 500;
      color: #6b5f4a; letter-spacing: 0.02em; margin-bottom: 6px;
    }
    #password-input {
      background: #f4f0e8;
      border: 1.5px solid rgba(0,0,0,0.09);
      border-radius: 10px;
      padding: 13px 14px;
      color: #1e1a14;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      margin-bottom: 6px;
    }
    #password-input:focus { border-color: #c8861a; }
    #password-input::placeholder { color: #b0a090; }
    #password-error {
      font-size: 12px; color: #c94040;
      display: none; margin-bottom: 10px;
    }
    #password-submit {
      width: 100%; font-family: 'Sora', sans-serif; font-weight: 600;
      font-size: 15px; border-radius: 10px; padding: 13px 24px;
      cursor: pointer; border: none; letter-spacing: -0.01em;
      background: #c8861a; color: #fff;
      transition: all 0.15s; margin-top: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    #password-submit:hover {
      background: #b5750f;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,134,26,0.35);
    }
    @keyframes mjFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #password-gate .mj-inner { animation: mjFadeUp 0.35s ease both; }
  </style>
  <div id="password-gate">
    <div class="mj-glow"></div>
    <div class="mj-inner" style="width:100%;max-width:380px;position:relative;z-index:1;">
      <div class="mj-card">
        <div class="mj-logo">
          <svg width="38" height="38" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7"  cy="20" r="5.5" fill="#c9a87a" stroke="#c8861a" stroke-width="1.5"/>
            <circle cx="7"  cy="20" r="2.5" fill="#c8861a" opacity="0.6"/>
            <circle cx="33" cy="20" r="5.5" fill="#c9a87a" stroke="#c8861a" stroke-width="1.5"/>
            <circle cx="33" cy="20" r="2.5" fill="#c8861a" opacity="0.6"/>
            <ellipse cx="20" cy="19" rx="13" ry="13" fill="#c9a87a"/>
            <ellipse cx="20" cy="22" rx="8"  ry="7"  fill="#e8cfa0"/>
            <circle cx="16" cy="17" r="2.5" fill="white"/>
            <circle cx="24" cy="17" r="2.5" fill="white"/>
            <circle cx="16.8" cy="17" r="1.2" fill="#3a2a10"/>
            <circle cx="24.8" cy="17" r="1.2" fill="#3a2a10"/>
            <circle cx="17.2" cy="16.4" r="0.5" fill="white" opacity="0.8"/>
            <circle cx="25.2" cy="16.4" r="0.5" fill="white" opacity="0.8"/>
            <ellipse cx="20" cy="21" rx="2" ry="1.2" fill="#a07840"/>
            <circle cx="19" cy="20.8" r="0.5" fill="#7a5020"/>
            <circle cx="21" cy="20.8" r="0.5" fill="#7a5020"/>
            <path d="M17 24 Q20 27 23 24" stroke="#c8861a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <path d="M17 7 Q20 4 23 7" stroke="#c8861a" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
          <span class="mj-logo-text">monkey<span>joe</span></span>
        </div>
        <h2>Welcome back 👋</h2>
        <p class="mj-sub">Enter your password to continue.</p>
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="Your password" autofocus />
        <div id="password-error">Wrong password — try again.</div>
        <button id="password-submit">Log in →</button>
      </div>
    </div>
  </div>
  <script>
    (function() {
      const gate = document.getElementById('password-gate');
      if (sessionStorage.getItem('mj_auth') === '1') { gate.remove(); return; }
      const input = document.getElementById('password-input');
      const btn   = document.getElementById('password-submit');
      const err   = document.getElementById('password-error');
      function tryPass() {
        if (typeof CONFIG !== 'undefined' && input.value === CONFIG.password) {
          sessionStorage.setItem('mj_auth', '1');
          gate.remove();
        } else {
          err.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }
      btn.addEventListener('click', tryPass);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') tryPass(); });
    })();
  </script>
</body>
</html>
